<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Cadastro de Usuário</h1>
        <form id="registration-form">
            <label for="name">Nome:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00">

            <label for="phone">Telefone:</label>
            <input type="tel" id="phone" name="phone" required placeholder="(00) 00000-0000">

            <button type="submit" id="submit-button" disabled>Cadastrar</button>
        </form>
        <div id="timer">
            <p>Tempo restante para cadastro:</p>
            <span id="days">00</span> dias
            <span id="hours">00</span> horas
            <span id="minutes">00</span> minutos
            <span id="seconds">00</span> segundos
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
